<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tournament</title>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="icon" href="assets/tourney/DevinOpenIcon.png"/>
</head>
<body>
  <div class="centered">
    <img src="assets/tourney/TheOpen.png" alt="The Devini15 Open" width = 30%/>
  </div>
  <div class="centered">
    <h1>$450 Prize Pool</h1><br/>
  </div>
  <div class="centered">
    Thanks to the generous donations of Kirb & Austin
  </div>
  <div class="centered">
      <a href="tourney/rules.html"><img src="assets/tourney/RulesButton.png" alt="Rules"/></a>&ensp;
      <a href="tourney/schedule.html"><img src="assets/tourney/ScheduleButton.png" alt="Schedule"/></a>&ensp;
      <a href="tourney/bracket.html"><img src="assets/tourney/BracketButton.png" alt="Bracket"/></a>&ensp;
      <a href="tourney/teams.html"><img src="assets/tourney/TeamsButton.png" alt="Teams"/></a>
  </div>

  <div id="music-player">
      <button id="btn-prev">⏮</button>
      <button id="btn-play">▶</button>
      <button id="btn-next">⏭</button>
      <button id="btn-mute">🔇</button>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
      <span id="song-title">Loading...</span>
  </div>

  <audio id="bg-audio" preload="auto"></audio>

  <script src="/Content/scripts/player.js"></script>
</body>
</html>
